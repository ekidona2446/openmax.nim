[server]
host = "[::1]"
dualstack_mode = "auto"
log_level = "debug"

[tls]
enabled = true
cert_file = "certs/cert.pem"
key_file = "certs/key.pem"
min_version = "1.2"
max_version = "1.3"

[database]
kind = "sqlite"
sqlite_file = "openmax.db"
mysql_host = "127.0.0.1"
mysql_port = 3306
mysql_user = "root"
mysql_password = "password"
mysql_database = "openmax"

[service_urls]
avatar_base_url = "http://127.0.0.1/avatar/"
origins = ["http://127.0.0.1", "https://web.openmax.su"]

[protocols]
oneme_tcp_enabled = true
oneme_tcp_port = 443
oneme_ws_enabled = true
oneme_ws_port = 81
tamtam_tcp_enabled = true
tamtam_tcp_port = 4433
tamtam_ws_enabled = true
tamtam_ws_port = 82

[calls]
enabled = true
application_key = "CNHIJPLGDIHBABABA"
signaling_host = ""
signaling_port = 0
signaling_path = "/websocket"
turn_urls = ["turn:turn.openmax.su:3478"]
turn_username = "openmax"
turn_credential = "change-me"
stun_urls = ["stun:stun.openmax.su:3478"]
session_ttl_seconds = 3600
token_ttl_seconds = 300

[integrations]
telegram_enabled = false
telegram_token = "123456789:ABCDEFGHIJKLMNOPQRSTUVWXYZ"
telegram_whitelist_enabled = true
telegram_whitelist_ids = ["1", "2", "3"]
sms_gateway_url = "http://127.0.0.1:8100/sms-gateway"
push_firebase_credentials_path = ""
geoip_db_path = ""
